apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "toggl-pg-mirror.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: toggl-pg-mirror
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "toggl-pg-mirror.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              export TOGGL_PG_MIRROR_POSTGRES_URL="postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}.{{ .Values.cnpg.namespace }}:${DB_PORT}/${DB_NAME}"
              exec /entrypoint.sh {{ .Values.app.command }}
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.copySecretName }}
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.copySecretName }}
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.copySecretName }}
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.copySecretName }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.copySecretName }}
                  key: password
            - name: TOGGL_PG_MIRROR_POSTGRES_SCHEMA
              value: {{ .Values.postgresql.schema }}
            - name: TOGGL_PG_MIRROR_TOGGL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.toggl.existingSecret.name }}
                  key: {{ .Values.toggl.existingSecret.key }}
          ports:
            - name: health
              containerPort: {{ .Values.healthcheck.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.livenessPath }}
              port: health
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.readinessPath }}
              port: health
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
