services:
  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres:/var/lib/postgresql/
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U $$POSTGRES_USER -h $$(hostname -i)"]
      interval: 10s
      start_period: 30s

  app:
    image: ghcr.io/stephane-klein/toggl-pg-mirror:latest
    build: ../
    volumes:
      - ../toggl-export-data/:/toggl-export-data/
    ports:
      - 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      TOGGL_PG_MIRROR_POSTGRES_SCHEMA: memex
      TOGGL_PG_MIRROR_POSTGRES_URL: postgres://postgres:password@postgres:5432/postgres
      TOGGL_PG_MIRROR_TOGGL_API_TOKEN: ${TOGGL_PG_MIRROR_TOGGL_API_TOKEN}

volumes:
  postgres:
    name: ${COMPOSE_PROJECT_NAME}_postgres
