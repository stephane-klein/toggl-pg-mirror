[env]
_.path = './node_modules/.bin'
_.source = [
  '.envrc',
  { path = 'scripts/load_postgres_variables.sh', tools = true, cacheable = false }
]
_.file = '.secret'

[shell_alias]
reload = "source scripts/load_postgres_variables.sh"

[tools]
node = "24.16.0"
pnpm = "11.5.0"
usql = "0.21.4"
"aqua:gitleaks/gitleaks" = "8.30.1"

[tasks.lint]
run ="pnpm run lint"

[tasks.format]
run ="pnpm run format"

[tasks.check]
run ="pnpm run check"

[tasks.lint-pkg]
run = "pnpm run lint:pkg"

[tasks.up]
run = "podman compose up -d"

[tasks.migrate]
run = "node src/migrate.js"

[tasks.seed]
run = "node src/seed.js"

[tasks.dump-schema]
run = "./scripts/dump-schema.sh"

[tasks.teardown]
run = "podman compose down -v --remove-orphans"

[tasks.clean]
run = "usql ${TOGGL_PG_MIRROR_POSTGRES_URL} < sqls/clean.sql"

[tasks.enter-in-pg]
run = "usql ${TOGGL_PG_MIRROR_POSTGRES_URL}"

[tasks.build-image]
run = "podman build -t toggl-pg-mirror ."

[tasks.build-image-cache]
run = "podman build --layers -t toggl-pg-mirror ."

[tasks.setup-secret]
description = "Generate .secret from scripts/generate-secret.sh via gopass"
run = "bash scripts/generate-secret.sh > .secret"

[tasks.setup-git-hooks]
run = "scripts/setup-git-hooks.sh"

[tasks.setup-jj-alias]
run = "scripts/setup-jj-alias.sh"

[tasks.gitleaks-check-push]
run = "scripts/gitleaks-check-push.sh"

[tasks.gitleaks-scan]
run = "gitleaks dir --no-banner -v {{config_root}}"

[tasks.gitleaks-history-scan]
description = "Scan entire jj commit history for secrets with gitleaks"
run = "gitleaks git --no-banner -v .git"

