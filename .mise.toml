[env]
_.path = './node_modules/.bin'
_.source = [
  '.envrc',
  { path = 'scripts/load_postgres_variables.sh', tools = true, cacheable = false }
]
_.file = '.secret'

[shell_alias]
reload = "source scripts/load_postgres_variables.sh"

[tools]
node = "24.16.0"
pnpm = "11.5.0"
usql = "0.21.4"
"aqua:gitleaks/gitleaks" = "8.30.1"
helm = "4.2.2"
xh = "0.26.1"

[tasks.lint]
run ="pnpm run lint"

[tasks.format]
run ="pnpm run format"

[tasks.check]
run ="pnpm run check"

[tasks.lint-pkg]
run = "pnpm run lint:pkg"

[tasks.up]
run = "podman compose up -d"

[tasks.migrate]
run = "node src/migrate.js"

[tasks.seed]
run = "node src/seed.js"

[tasks.dump-schema]
run = "./scripts/dump-schema.sh"

[tasks.teardown]
run = "podman compose down -v --remove-orphans"

[tasks.clean]
run = "usql ${TOGGL_PG_MIRROR_POSTGRES_URL} < sqls/clean.sql"

[tasks.enter-in-pg]
run = "usql ${TOGGL_PG_MIRROR_POSTGRES_URL}"

[tasks.build-image]
run = "podman build -t ghcr.io/stephane-klein/toggl-pg-mirror:latest ."

[tasks.build-image-cache]
run = "podman build --layers -t ghcr.io/stephane-klein/toggl-pg-mirror:latest ."

[tasks.login-ghcr]
run = """
if ! gh auth token &>/dev/null; then
    echo "Error: gh not authenticated. Please run:"
    echo "  gh auth login -s repo,write:packages,read:org"
    exit 1
fi
podman logout ghcr.io 2>/dev/null || true
podman login ghcr.io -u stephane-klein --password-stdin <<< "$(gh auth token)"
"""
description = "Login to GitHub Container Registry using gh CLI"

[tasks.push-image]
run = "podman push ghcr.io/stephane-klein/toggl-pg-mirror:latest"
description = "Push the container image to GitHub Container Registry"

[tasks.login-ghcr-helm]
description = "Authenticate Helm with GitHub Container Registry using gh CLI"
run = """
helm registry login ghcr.io -u stephane-klein --password-stdin <<< "$(gh auth token)"
"""

[tasks.publish-chart]
description = "Package and push Helm chart to OCI registry (ghcr.io)"
run = """
helm package helm/toggl-pg-mirror -d /tmp && \
helm push /tmp/toggl-pg-mirror-*.tgz oci://ghcr.io/stephane-klein/charts
"""

[tasks.setup-secret]
description = "Generate .secret from scripts/generate-secret.sh via gopass"
run = "bash scripts/generate-secret.sh > .secret"

[tasks.setup-git-hooks]
run = "scripts/setup-git-hooks.sh"

[tasks.setup-jj-alias]
run = "scripts/setup-jj-alias.sh"

[tasks.gitleaks-check-push]
run = "scripts/gitleaks-check-push.sh"

[tasks.gitleaks-scan]
run = "gitleaks dir --no-banner -v {{config_root}}"

[tasks.gitleaks-history-scan]
description = "Scan entire jj commit history for secrets with gitleaks"
run = "gitleaks git --no-banner -v .git"

[tasks.make-packages-public]
description = "Print instructions to make GHCR packages publicly readable (no API available)"
run = """
echo "==> GitHub REST API does not support changing package visibility."
echo "==> Manual steps required:"
echo ""
echo "1. Open in your browser:"
echo "   https://github.com/users/stephane-klein/packages/container/toggl-pg-mirror/settings"
echo "   -> Danger Zone > Change visibility > Public"
echo ""
echo "2. Open in your browser:"
echo "   https://github.com/users/stephane-klein/packages/container/charts%2Ftoggl-pg-mirror/settings"
echo "   -> Danger Zone > Change visibility > Public"
"""

